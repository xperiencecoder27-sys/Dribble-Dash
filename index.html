<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Dribble Dash</title>

    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: Arial;
        }

        canvas {
            display: block;
        }
    </style>
</head>

<body>

    <canvas id="game"></canvas>

    <script>
        const canvas = document.getElementById("game");
        const ctx = canvas.getContext("2d");

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const groundY = canvas.height - 120;

        /* ================= AUDIO ================= */
        const audioCtx = new(window.AudioContext || window.webkitAudioContext)();

        /* 🎵 WORLD CUP MUSIC */
        function startMusic() {
            const notes = [196, 247, 294, 392];
            let i = 0;

            setInterval(() => {
                if (state !== "playing") return;

                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();

                osc.type = "triangle";
                osc.frequency.value = notes[i % notes.length];

                gain.gain.value = 0.03;

                osc.connect(gain);
                gain.connect(audioCtx.destination);

                osc.start();
                osc.stop(audioCtx.currentTime + 0.2);

                i++;
            }, 250);
        }

        /* 🎮 JUMP SOUND */
        function jumpSound() {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();

            osc.type = "square";
            osc.frequency.setValueAtTime(700, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(250, audioCtx.currentTime + 0.12);

            gain.gain.value = 0.15;

            osc.connect(gain);
            gain.connect(audioCtx.destination);

            osc.start();
            osc.stop(audioCtx.currentTime + 0.12);
        }

        /* 💥 DEATH SOUND */
        function boomSound() {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();

            osc.type = "sawtooth";
            osc.frequency.setValueAtTime(180, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(20, audioCtx.currentTime + 1);

            gain.gain.value = 1;

            osc.connect(gain);
            gain.connect(audioCtx.destination);

            osc.start();
            osc.stop(audioCtx.currentTime + 1);
        }

        /* ================= GAME STATE ================= */
        let state = "menu";
        let score = 0;
        let lives = 3;
        const speed = 6;
        let frame = 0;

        /* ================= COVER IMAGE ================= */
        const coverImg = new Image();
        coverImg.src = "https://images.unsplash.com/photo-1522778119026-d647f0596c20";

        /* ================= PLAYER ================= */
        const player = {
            x: 120,
            y: 0,
            w: 40,
            h: 80,
            vy: 0,
            gravity: 0.55,
            jump: -15,
            onGround: true
        };

        player.y = groundY - player.h;

        const enemies = [];
        const passed = new Set();

        /* ================= INPUT ================= */
        window.addEventListener("keydown", (e) => {
            const key = e.key.toLowerCase();

            if (state === "menu" && key === "q") {
                state = "playing";
                audioCtx.resume();
                startMusic();
            }

            if (state === "playing" && e.code === "Space") {
                if (player.onGround) {
                    player.vy = player.jump;
                    player.onGround = false;
                    jumpSound();
                }
            }

            if (key === "r") location.reload();
        });

        /* ================= SPAWN ================= */
        setInterval(() => {
            if (state === "playing") {
                enemies.push({
                    x: canvas.width + 50,
                    y: groundY - 80,
                    w: 40,
                    h: 80,
                    id: Math.random()
                });
            }
        }, 1200);

        /* ================= UPDATE ================= */
        function update() {
            if (state !== "playing") return;

            frame++;

            player.vy += player.gravity;
            player.y += player.vy;

            if (player.y + player.h >= groundY) {
                player.y = groundY - player.h;
                player.vy = 0;
                player.onGround = true;
            }

            const p = {
                x: player.x + 10,
                y: player.y + 10,
                w: player.w - 20,
                h: player.h - 10
            };

            for (let i = enemies.length - 1; i >= 0; i--) {
                let d = enemies[i];
                d.x -= speed;

                const eBox = {
                    x: d.x + 8,
                    y: d.y + 10,
                    w: d.w - 16,
                    h: d.h - 20
                };

                if (
                    p.x < eBox.x + eBox.w &&
                    p.x + p.w > eBox.x &&
                    p.y < eBox.y + eBox.h &&
                    p.y + p.h > eBox.y
                ) {
                    lives--;
                    enemies.splice(i, 1);

                    if (lives <= 0) {
                        state = "over";
                        boomSound();
                    }
                }

                if (!passed.has(d.id) && d.x + d.w < player.x) {
                    score++;
                    passed.add(d.id);
                }

                if (d.x < -100) enemies.splice(i, 1);
            }
        }

        /* ================= BACKGROUND ================= */
        function bg() {
            let g = ctx.createLinearGradient(0, 0, 0, canvas.height);
            g.addColorStop(0, "#4fc3f7");
            g.addColorStop(1, "#b3e5fc");

            ctx.fillStyle = g;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = "#2ecc71";
            ctx.fillRect(0, groundY, canvas.width, 120);
        }

        /* ================= MENU (FIXED COVER) ================= */
        function menu() {
            if (coverImg.complete) {
                ctx.drawImage(coverImg, 0, 0, canvas.width, canvas.height);
            } else {
                ctx.fillStyle = "black";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
            }

            ctx.fillStyle = "rgba(0,0,0,0.5)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = "white";
            ctx.font = "60px Arial";
            ctx.fillText("DRIBBLE DASH", 100, 200);

            ctx.font = "25px Arial";
            ctx.fillText("Press Q to Start", 100, 260);
        }

        /* ================= PLAYER ================= */
        function drawPlayer() {
            let run = Math.sin(frame * 0.2) * 4;

            // HEAD (same for ALL characters)
            ctx.fillStyle = "#f1c27d";
            ctx.beginPath();
            ctx.arc(player.x + 20, player.y + 15, 10, 0, Math.PI * 2);
            ctx.fill();

            // BODY
            ctx.fillStyle = "#2196f3";
            ctx.fillRect(player.x + 10, player.y + 25, 20, 40);

            ctx.fillStyle = "white";
            ctx.fillRect(player.x + 14, player.y + 25, 3, 40);
            ctx.fillRect(player.x + 20, player.y + 25, 3, 40);

            // LEGS
            ctx.fillStyle = "#000";
            ctx.fillRect(player.x + 12, player.y + 65, 6, 15 + run);
            ctx.fillRect(player.x + 22, player.y + 65, 6, 15 - run);
        }

        /* ================= ENEMIES (SAME HEAD FIX) ================= */
        function drawEnemies() {
            enemies.forEach(d => {
                let run = Math.sin(frame * 0.2) * 3;

                // SAME HEAD AS PLAYER
                ctx.fillStyle = "#f1c27d";
                ctx.beginPath();a
                ctx.arc(d.x + 20, d.y + 15, 10, 0, Math.PI * 2);
                ctx.fill();

                ctx.fillStyle = "#e53935";
                ctx.fillRect(d.x + 10, d.y + 25, 20, 40);

                ctx.fillStyle = "white";
                ctx.fillRect(d.x + 14, d.y + 25, 3, 40);
                ctx.fillRect(d.x + 20, d.y + 25, 3, 40);

                ctx.fillStyle = "#000";
                ctx.fillRect(d.x + 12, d.y + 65, 6, 15 + run);
                ctx.fillRect(d.x + 22, d.y + 65, 6, 15 - run);
            });
        }

        /* ================= UI ================= */
        function ui() {
            ctx.fillStyle = "black";
            ctx.font = "18px Arial";
            ctx.fillText("Score: " + score, 20, 30);
            ctx.fillText("Lives: " + lives, 20, 55);
        }

        /* ================= GAME OVER ================= */
        function over() {
            ctx.fillStyle = "rgba(0,0,0,0.7)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = "white";
            ctx.font = "50px Arial";
            ctx.fillText("GAME OVER", 100, 200);

            ctx.font = "20px Arial";
            ctx.fillText("Press R to restart", 100, 260);
        }

        /* ================= LOOP ================= */
        function loop() {
            update();

            if (state === "menu") menu();
            else {
                bg();
                drawPlayer();
                drawEnemies();
                ui();
                if (state === "over") over();
            }

            requestAnimationFrame(loop);
        }

        loop();
    </script>

</body>

</html>
